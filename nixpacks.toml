# nixpacks.toml
[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", 
           "php82Extensions.mbstring", "php82Extensions.xml", 
           "php82Extensions.curl", "php82Extensions.zip",
           "php82Extensions.gd", "php82Extensions.tokenizer",
           "composer", "nodejs_20", "npm"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  # Buat symlink storage di fase build (lebih stabil dari start)
  "php artisan storage:link || true"
]

[start]
# storage:link dijalankan lagi saat start sebagai fallback jika Railway restart container
cmd = "php artisan migrate --force && php artisan storage:link --force || true && php artisan serve --host=0.0.0.0 --port=$PORT"
